<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1025 310" role="img" aria-labelledby="title desc">
  <title id="title">What LOCK-seq Reveals</title>
  <desc id="desc">A single-row diagram showing precise knock-in, imprecise insertion/concatentation, non-KI alleles, and random integrations, with a legend for genomic sequence, intended insert, vector backbone, indel/mutation, and random integration.</desc>
  <defs>
    <style>
      .box{fill:#fff;stroke:#8dbbff;stroke-width:1.3}.title{font:700 24px Arial,Helvetica,sans-serif;fill:#061a57}.label{font:700 16px Arial,Helvetica,sans-serif}.small{font:400 16px Arial,Helvetica,sans-serif}.legend{font:400 14px Arial,Helvetica,sans-serif;fill:#061a57}.gene{stroke:#222;stroke-width:2;stroke-linecap:round}.dash{stroke-dasharray:7 7;stroke-width:2}.thin{stroke:#8dbbff;stroke-width:1}.seg{stroke:#333;stroke-width:1}.grey{fill:#f2f6fa}.green{fill:#087b41}.orange{fill:#f37016}.purple{fill:#5a3495}.blue{fill:#2f66b3}.red{fill:#df151d}.pale{fill:#fff2f2}.arc{fill:none;stroke:#df151d;stroke-width:2;stroke-dasharray:5 4}.ellipsis{font:700 30px Arial,Helvetica,sans-serif;fill:#111}
    </style>
  </defs>
  <rect class="box" x="1" y="4" width="1023" height="302" rx="9"/>
  <text class="title" x="512" y="37" text-anchor="middle">What LOCK-seq Reveals  (Unbiased, Genome-wide)</text>

  <g transform="translate(0,0)">
    <text class="label" x="98" y="76" text-anchor="middle" fill="#088342">Precise KI</text>
    <line class="dash" x1="98" y1="84" x2="98" y2="116" stroke="#088342"/>
    <circle cx="98" cy="132" r="15" fill="none" stroke="#088342" stroke-width="3"/>
    <path d="M89 132 l7 8 l14 -18" fill="none" stroke="#088342" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="translate(0,0)">
    <text class="label" x="307" y="75" text-anchor="middle" fill="#ff5b00">Imprecise</text>
    <text class="small" x="307" y="96" text-anchor="middle" fill="#ff5b00">imprecision /</text>
    <text class="small" x="307" y="116" text-anchor="middle" fill="#ff5b00">concatentation</text>
    <line class="dash" x1="307" y1="123" x2="307" y2="151" stroke="#ff5b00"/>
    <path d="M307 126 l16 29 h-32 z" fill="none" stroke="#ff5b00" stroke-width="3" stroke-linejoin="round"/>
    <line x1="307" y1="136" x2="307" y2="145" stroke="#ff5b00" stroke-width="3" stroke-linecap="round"/>
    <circle cx="307" cy="151" r="1.8" fill="#ff5b00"/>
  </g>

  <g transform="translate(0,0)">
    <text class="label" x="508" y="76" text-anchor="middle" fill="#005ecb">Non-KI</text>
    <text class="label" x="508" y="98" text-anchor="middle" fill="#005ecb">alleles</text>
    <line class="dash" x1="508" y1="107" x2="508" y2="145" stroke="#005ecb"/>
    <circle cx="508" cy="134" r="14" fill="white" stroke="#005ecb" stroke-width="3"/>
  </g>

  <g transform="translate(0,0)">
    <text class="label" x="787" y="78" text-anchor="middle" fill="#e00000">Random integrations</text>
    <text class="small" x="787" y="99" text-anchor="middle" fill="#e00000">(full or partial vectors)</text>
    <path class="arc" d="M653 173 C653 118 922 118 922 173"/>
    <path class="arc" d="M740 173 C740 99 835 99 835 173"/>
    <path class="arc" d="M833 173 C833 119 944 119 944 173"/>
    <line class="dash" x1="787" y1="106" x2="787" y2="130" stroke="#e00000"/>
  </g>

  <line class="gene" x1="24" y1="188" x2="973" y2="188"/>
  <text class="ellipsis" x="982" y="193">...</text>

  <!-- Precise KI block -->
  <rect class="grey seg" x="43" y="180" width="20" height="17"/>
  <rect class="green seg" x="63" y="180" width="70" height="17"/>
  <rect class="grey seg" x="133" y="180" width="21" height="17"/>

  <!-- Imprecise block -->
  <rect class="orange seg" x="224" y="180" width="88" height="17"/>
  <rect class="purple seg" x="312" y="180" width="61" height="17"/>
  <rect class="grey seg" x="373" y="180" width="20" height="17"/>

  <!-- Non-KI block -->
  <rect class="grey seg" x="468" y="180" width="20" height="17"/>
  <rect class="blue seg" x="488" y="180" width="39" height="17"/>
  <rect class="grey seg" x="527" y="180" width="20" height="17"/>

  <!-- Random integrations as red blocks on genome line -->
  <rect class="red seg" x="631" y="180" width="44" height="17"/>
  <rect class="red seg" x="717" y="180" width="44" height="17"/>
  <rect class="red seg" x="822" y="180" width="44" height="17"/>
  <rect class="red seg" x="908" y="180" width="44" height="17"/>

  <line class="thin" x1="24" y1="242" x2="1000" y2="242"/>

  <!-- Legend -->
  <g transform="translate(52,262)">
    <rect class="grey seg" x="0" y="0" width="22" height="18"/><text class="legend" x="34" y="14">Genomic sequence</text>
    <rect class="green seg" x="203" y="0" width="25" height="18"/><text class="legend" x="240" y="14">Intended insert</text>
    <rect class="purple seg" x="380" y="0" width="25" height="18"/><text class="legend" x="417" y="14">Vector backbone</text>
    <rect class="orange seg" x="577" y="0" width="25" height="18"/><text class="legend" x="614" y="14">Indel / mutation</text>
    <rect class="red seg" x="758" y="0" width="25" height="18"/><text class="legend" x="795" y="14">Random integration</text>
  </g>
</svg>